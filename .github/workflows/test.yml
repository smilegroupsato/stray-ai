name: test

on:
  push:
    branches:
      - main
      - agent/**
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Validate habitat scripts
        run: bash -n scripts/setup_devbox.sh scripts/snapshot_eternal_free_party.sh
      - name: Install
        run: python -m pip install --upgrade pip && python -m pip install -e .[dev]
      - name: Compile
        run: python -m compileall -q src tests scripts
      - name: Test
        run: pytest -q
