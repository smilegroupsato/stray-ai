  - title: 完了済み基盤
    detail: Stray AIが安全に生まれ、訪れ、帰り、休み、観察記録を残すための基礎機能群
    children:
      - title: v0.1 The First Visitor
        detail: 一人のpersistent visitorがbounded Venueを訪れ、何かを持ち帰り、同じ個体として帰還できるようにする
      - title: v0.1.1 The First Persistent Visitor
        detail: Visitをまたいで個体の状態・記憶・疲労・休息を保持し、現在地と過去の場所を分離する
      - title: v0.2 The First Wake Judgment
        detail: Venue本文を読まず、休息と疲労とsnapshot identityだけで、起きる理由があるかを手動判断する
      - title: Visit Report v0
        detail: Visitの経路・観察・Trace・source coordinatesを、操作機能のない静的な観察アーカイブとして閲覧する
      - title: Venue Operations v0
        detail: 訪問先をbounded Venueとして登録し、固定manifestとcommit-addressed snapshotで安全に準備する
      - title: Memory provenance v0
        detail: 記憶本文と、systemが記録した時刻・source Visit・stepを分離して由来を追跡可能にする

