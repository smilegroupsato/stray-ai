    detail: trusted Venue allowlistまたはregistryの正本位置と、unknown・duplicate・malformed時のfail-closedを確定する
  - title: Decision Gate 3 — selector scope
    detail: deterministic-onlyで開始するか、bounded selector adapterまでv0に含めるか決める
  - title: Implementation decision gate
    detail: synthetic fixture方針を確認した後、実装範囲と人間承認点を改めて決定する

