  purpose: 複数の登録Venueについて本文を読まず、trusted Venue IDとsnapshot identityだけから、起きる理由がある候補を安全に一つ選ぶ設計を確定する
  stage: design
  next_action: Issue #53のDecision Gateを確認し、side effect・trusted Venue registry・selector範囲・実装可否を確定する
  implementation_authorized: false
  issue: Issue #53
  notes:
    - Venue本文・snapshot本文は読まない
    - 入力はtrusted Venue ID・snapshot identity・休息と疲労などの既存safe stateに限定する
